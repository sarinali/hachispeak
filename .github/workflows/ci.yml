name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Lint, test, typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install root dependencies
        run: npm ci

      - name: Install server dependencies
        run: npm run server:install

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run fmt:check

      - name: Unit tests
        run: npm test

      - name: Typecheck server
        run: npm run server:compile
