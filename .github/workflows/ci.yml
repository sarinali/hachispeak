name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Lint, test, typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install root dependencies
        run: bun install

      - name: Install server dependencies
        run: bun run server:install

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run fmt:check

      - name: Unit tests
        run: bun test

      - name: Typecheck server
        run: bun run server:compile
