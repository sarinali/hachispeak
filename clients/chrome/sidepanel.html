<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>hachispeak</title>
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body>
    <div class="container">
      <!-- Header -->
      <div class="header">
        <img src="icons/icon.png" alt="hachispeak" class="header-icon" />
        <span>hachispeak</span>
      </div>

      <!-- Voice -->
      <div class="control-group">
        <label class="label">Voice</label>
        <select id="voice-select"></select>
      </div>

      <!-- Volume -->
      <div class="control-group">
        <label class="label">Volume</label>
        <div class="volume-row">
          <input
            type="range"
            id="volume-slider"
            min="0"
            max="100"
            value="80"
            class="volume-slider"
          />
          <span id="volume-value" class="volume-value">80%</span>
        </div>
      </div>

      <!-- Speed -->
      <div class="control-group">
        <label class="label">Speed</label>
        <div class="volume-row">
          <input
            type="range"
            id="speed-slider"
            min="0.5"
            max="2"
            step="0.05"
            value="1"
            class="volume-slider"
          />
          <span id="speed-value" class="volume-value">1.0x</span>
        </div>
      </div>

      <!-- Playback -->
      <section class="playback-section">
        <div class="playback-controls">
          <button id="play-btn" class="btn btn-primary" disabled>
            <svg class="icon play-icon" viewBox="0 0 24 24" fill="currentColor">
              <path d="M8 5v14l11-7z" />
            </svg>
          </button>
          <button id="download-btn" class="btn btn-secondary" disabled>
            <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
              <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z" />
            </svg>
          </button>
        </div>

        <!-- Loading (hidden) -->
        <div id="loading-indicator" class="loading hidden">
          <div class="spinner"></div>
          <span>Generating...</span>
        </div>
      </section>

      <!-- Settings -->
      <div class="settings-section">
        <label class="checkbox-label">
          <input type="checkbox" id="read-mode-checkbox" />
          <span>Click-to-read mode (click any text on the page)</span>
        </label>
      </div>

      <!-- Banner shown when app not running -->
      <div id="download-banner" class="download-banner hidden">
        <p class="banner-title">Open hachispeak app</p>
        <p class="banner-subtitle">Make sure the hachispeak server is running</p>
        <button id="retry-btn" class="retry-btn">Retry Connection</button>
        <span class="download-hint">Works offline, 100% private</span>
      </div>
    </div>

    <script src="constants.js"></script>
    <script src="src/streaming-player.js"></script>
    <script src="src/api.js"></script>
    <script src="src/settings.js"></script>
    <script src="src/playback.js"></script>
    <script src="sidepanel.js"></script>
  </body>
</html>
